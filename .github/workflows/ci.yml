name: Android CI Build

on:
  push:
    branches: [ main, kiwi ]
  pull_request:
    branches: [ main, kiwi ]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android licenses
        run: yes | sdkmanager --licenses || true

      - name: Install Android build tools
        run: sdkmanager "build-tools;34.0.0" "platforms;android-34"

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew || true

      - name: Generate Gradle wrapper
        run: |
          if [ ! -f gradlew ]; then
            echo "Generating Gradle wrapper..."
            gradle wrapper --gradle-version 8.5
          fi
          chmod +x gradlew

      # ── Verification Steps ──────────────────────────────────

      - name: Verify file structure
        run: |
          echo "=== Verifying Satellite Space file structure ==="
          REQUIRED_FILES=(
            "chrome/android/java/src/org/chromium/chrome/browser/satellitespace/SatelliteSpace.kt"
            "chrome/android/java/src/org/chromium/chrome/browser/satellitespace/SatelliteSpaceManager.kt"
            "chrome/android/java/src/org/chromium/chrome/browser/satellitespace/SatelliteSpacePreferences.kt"
            "chrome/android/java/src/org/chromium/chrome/browser/satellitespace/SatelliteSpaceTabHelper.kt"
            "chrome/android/java/src/org/chromium/chrome/browser/satellitespace/ui/SatelliteSpaceSelectorView.kt"
            "chrome/android/java/src/org/chromium/chrome/browser/satellitespace/ui/CreateSatelliteSpaceDialog.kt"
            "chrome/android/java/src/org/chromium/chrome/browser/satellitespace/ui/SatelliteSpaceTabSwitcherDecorator.kt"
            "chrome/android/java/src/org/chromium/chrome/browser/satellitespace/ui/SatelliteSpaceManagerActivity.kt"
            "SATELLITE_SPACE_INTEGRATION.md"
          )
          ALL_FOUND=true
          for f in "${REQUIRED_FILES[@]}"; do
            if [ -f "$f" ]; then
              echo "  ✓ $f"
            else
              echo "  ✗ MISSING: $f"
              ALL_FOUND=false
            fi
          done
          if [ "$ALL_FOUND" = false ]; then
            echo "ERROR: Required files missing!"
            exit 1
          fi
          echo "=== All required files present ==="

      - name: Lint — brace matching
        run: |
          echo "=== Brace matching ==="
          ERRORS=0
          find chrome/android/java/src/org/chromium/chrome/browser/satellitespace \
            \( -name "*.kt" -o -name "*.java" \) | while read f; do
              OPENS=$(grep -o '{' "$f" | wc -l)
              CLOSES=$(grep -o '}' "$f" | wc -l)
              if [ "$OPENS" -ne "$CLOSES" ]; then
                echo "  ✗ $f  ($OPENS open, $CLOSES close)"
                ERRORS=$((ERRORS+1))
              else
                echo "  ✓ $f"
              fi
            done

      # ── Gradle Build ────────────────────────────────────────

      - name: Build — compile Kotlin/Java
        run: |
          echo "=== Running Gradle build ==="
          ./gradlew :satellitespace:compileDebugKotlin :satellitespace:compileDebugJavaWithJavac --no-daemon --stacktrace 2>&1

      - name: Build — assemble debug AAR
        run: |
          echo "=== Assembling debug AAR ==="
          ./gradlew :satellitespace:assembleDebug --no-daemon --stacktrace 2>&1

      - name: Build — run lint
        run: |
          echo "=== Running Android lint ==="
          ./gradlew :satellitespace:lintDebug --no-daemon 2>&1 || true

      # ── Artifacts ───────────────────────────────────────────

      - name: Upload AAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: satellite-space-aar
          path: satellitespace/build/outputs/aar/*.aar
          retention-days: 14

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: satellitespace/build/reports/lint-results-debug.html
          retention-days: 14

      # ── Summary ─────────────────────────────────────────────

      - name: Build summary
        if: always()
        run: |
          echo "## 🛰️ Satellite Space Android CI" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Check build outputs
          AAR_COUNT=$(find satellitespace/build/outputs/aar -name "*.aar" 2>/dev/null | wc -l)
          KT_COUNT=$(find chrome/android/java/src/org/chromium/chrome/browser/satellitespace -name "*.kt" | wc -l)
          LINE_COUNT=$(find chrome/android/java/src/org/chromium/chrome/browser/satellitespace \( -name "*.kt" -o -name "*.java" \) -exec cat {} + | wc -l)

          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Kotlin files | $KT_COUNT |" >> $GITHUB_STEP_SUMMARY
          echo "| Total source lines | $LINE_COUNT |" >> $GITHUB_STEP_SUMMARY
          echo "| AAR outputs | $AAR_COUNT |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "$AAR_COUNT" -gt 0 ]; then
            echo "### ✅ Build succeeded" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "AAR artifact uploaded. Download from **Actions → Artifacts**." >> $GITHUB_STEP_SUMMARY
          else
            echo "### ❌ Build failed" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Check the build logs above for errors." >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "See [SATELLITE_SPACE_INTEGRATION.md](SATELLITE_SPACE_INTEGRATION.md) for integration guide." >> $GITHUB_STEP_SUMMARY
